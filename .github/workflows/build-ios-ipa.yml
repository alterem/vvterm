name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method: app-store-connect, ad-hoc, development, or enterprise"
        required: true
        default: "app-store-connect"
        type: choice
        options:
          - app-store-connect
          - ad-hoc
          - development
          - enterprise
      upload_to_release:
        description: "Upload IPA to the GitHub release when running on a tag"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ios-ipa:
    name: Build iOS IPA
    runs-on: macos-26

    env:
      PROJECT: VVTerm.xcodeproj
      SCHEME: VVTerm
      CONFIGURATION: Release
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID || 'K68RDJ84GS' }}
      BUNDLE_ID: app.agatha.VivyTerm
      LIVE_ACTIVITY_BUNDLE_ID: app.agatha.VivyTerm.liveactivity
      DERIVED_DATA_PATH: ${{ github.workspace }}/.build/github-actions/DerivedData
      ARCHIVE_PATH: ${{ github.workspace }}/.build/github-actions/archives/VVTerm-iOS.xcarchive
      OUTPUT_DIR: ${{ github.workspace }}/.build/github-actions/output
      LOG_DIR: ${{ github.workspace }}/.build/github-actions/logs
      EXPORT_OPTIONS_PLIST: ${{ github.workspace }}/.build/github-actions/ExportOptions.plist
      ASC_API_KEY_PATH: ${{ github.workspace }}/.build/github-actions/AuthKey.p8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_SIGNING_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$CERTIFICATE_BASE64" ]]; then
            echo "IOS_SIGNING_CERTIFICATE_BASE64 is empty; skipping certificate import."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/signing-certificate.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROVISIONING_PROFILE_BASE64 }}
          LIVE_ACTIVITY_PROFILE_BASE64: ${{ secrets.IOS_LIVE_ACTIVITY_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_PROFILE_BASE64" ]]; then
            echo "IOS_APP_PROVISIONING_PROFILE_BASE64 is empty; skipping provisioning profile installation."
            exit 0
          fi

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$APP_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/vvterm-app.mobileprovision"

          if [[ -n "$LIVE_ACTIVITY_PROFILE_BASE64" ]]; then
            echo "$LIVE_ACTIVITY_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/vvterm-liveactivity.mobileprovision"
          fi

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          if [[ -z "$ASC_API_KEY_BASE64" ]]; then
            echo "APP_STORE_CONNECT_API_KEY_BASE64 is empty; automatic provisioning will use local Xcode accounts only."
            exit 0
          fi

          if [[ -z "$ASC_API_KEY_ID" || -z "$ASC_API_ISSUER_ID" ]]; then
            echo "APP_STORE_CONNECT_API_KEY_ID and APP_STORE_CONNECT_API_ISSUER_ID are required when APP_STORE_CONNECT_API_KEY_BASE64 is set." >&2
            exit 1
          fi

          mkdir -p "$(dirname "$ASC_API_KEY_PATH")"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$ASC_API_KEY_PATH"
          chmod 600 "$ASC_API_KEY_PATH"

      - name: Create export options
        env:
          EXPORT_METHOD: ${{ inputs.export_method || 'app-store-connect' }}
          APP_PROFILE_NAME: ${{ secrets.IOS_APP_PROVISIONING_PROFILE_NAME }}
          LIVE_ACTIVITY_PROFILE_NAME: ${{ secrets.IOS_LIVE_ACTIVITY_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$EXPORT_OPTIONS_PLIST")"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          EOF

          if [[ -n "$APP_PROFILE_NAME" ]]; then
            cat >> "$EXPORT_OPTIONS_PLIST" <<EOF
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$APP_PROFILE_NAME</string>
          EOF

            if [[ -n "$LIVE_ACTIVITY_PROFILE_NAME" ]]; then
              cat >> "$EXPORT_OPTIONS_PLIST" <<EOF
              <key>$LIVE_ACTIVITY_BUNDLE_ID</key>
              <string>$LIVE_ACTIVITY_PROFILE_NAME</string>
          EOF
            fi

            cat >> "$EXPORT_OPTIONS_PLIST" <<EOF
            </dict>
          EOF
          else
            cat >> "$EXPORT_OPTIONS_PLIST" <<EOF
            <key>signingStyle</key>
            <string>automatic</string>
          EOF
          fi

          cat >> "$EXPORT_OPTIONS_PLIST" <<EOF
          </dict>
          </plist>
          EOF

          plutil -lint "$EXPORT_OPTIONS_PLIST"

      - name: Archive and export IPA
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROVISIONING_PROFILE_BASE64 }}
          CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p "$LOG_DIR"
          chmod +x scripts/package-ios-ipa.sh

          if [[ -f "$ASC_API_KEY_PATH" ]]; then
            export ALLOW_PROVISIONING_UPDATES=1
            export APP_STORE_CONNECT_API_KEY_PATH="$ASC_API_KEY_PATH"
            export APP_STORE_CONNECT_API_KEY_ID="$ASC_API_KEY_ID"
            export APP_STORE_CONNECT_API_ISSUER_ID="$ASC_API_ISSUER_ID"
          elif [[ -z "$APP_PROFILE_BASE64" ]]; then
            if [[ -z "$CERTIFICATE_BASE64" ]]; then
              echo "No signing credentials were provided; building an unsigned IPA artifact."
              export UNSIGNED_IPA=1
            else
              export ALLOW_PROVISIONING_UPDATES=1
            fi
          fi

          set +e
          scripts/package-ios-ipa.sh \
            "$ARCHIVE_PATH" \
            "$OUTPUT_DIR" \
            "$EXPORT_OPTIONS_PLIST" \
            "$PROJECT" \
            "$SCHEME" 2>&1 | tee "$LOG_DIR/xcodebuild-ios.log"
          BUILD_EXIT_CODE="${PIPESTATUS[0]}"
          set -e

          if [[ "$BUILD_EXIT_CODE" -ne 0 ]]; then
            echo "::group::Relevant xcodebuild errors"
            grep -nEi "error:|fatal error:|CompileSwift|BUILD FAILED|ARCHIVE FAILED|No profiles|CodeSign|Provisioning" "$LOG_DIR/xcodebuild-ios.log" || true
            echo "::endgroup::"
            exit "$BUILD_EXIT_CODE"
          fi

          IPA_PATH="$(find "$OUTPUT_DIR" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA was exported to $OUTPUT_DIR" >&2
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VVTerm-ios-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        if: github.ref_type == 'tag' && (github.event_name == 'push' || inputs.upload_to_release)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IPA_PATH }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VVTerm-ios-build-logs
          path: |
            ${{ env.LOG_DIR }}/xcodebuild-ios.log
            ${{ env.EXPORT_OPTIONS_PLIST }}
          if-no-files-found: warn
